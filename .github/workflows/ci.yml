name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish as a release asset
        required: true
        default: v0.2.0

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            chore
            ci
            build

  linux-checks:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Flutter version from .fvmrc
        shell: bash
        run: |
          FLUTTER_VERSION="$(python3 - <<'PY'
          import json
          print(json.load(open('.fvmrc'))['flutter'])
          PY
          )"
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev xvfb

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install workspace dependencies
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Check formatting
        run: dart run melos run format-check

      - name: Run static analysis
        run: dart run melos run analyze

      - name: Run workspace tests
        run: dart run melos run test

      - name: Run Linux desktop integration test
        working-directory: packages/bochki_schedule_app
        run: xvfb-run -a flutter test integration_test/app_shell_test.dart -r expanded

  windows-desktop:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Flutter version from .fvmrc
        shell: pwsh
        run: |
          $version = (Get-Content .fvmrc | ConvertFrom-Json).flutter
          "FLUTTER_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install workspace dependencies
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Build Windows release app
        working-directory: packages/bochki_schedule_app
        run: flutter build windows --release

      - name: Archive Windows app release
        shell: pwsh
        working-directory: packages/bochki_schedule_app/build/windows/x64/runner/Release
        run: |
          $archivePath = Join-Path (Get-Location) 'bochki_schedule_app-windows-release.zip'
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path * -DestinationPath $archivePath -Force

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bochki-schedule-windows-release
          path: packages/bochki_schedule_app/build/windows/x64/runner/Release/bochki_schedule_app-windows-release.zip
          if-no-files-found: error

      - name: Run Windows desktop integration test
        working-directory: packages/bochki_schedule_app
        run: flutter test integration_test/app_shell_test.dart -d windows -r expanded

  macos-release-build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: intel
            runner: macos-15-intel
            architecture: x64
            artifact_name: bochki-schedule-macos-intel-release
            zip_name: bochki_schedule_app-macos-intel-release.zip
          - name: arm64
            runner: macos-15
            architecture: ARM64
            artifact_name: bochki-schedule-macos-arm64-release
            zip_name: bochki_schedule_app-macos-arm64-release.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - name: Read Flutter version from .fvmrc
        shell: bash
        run: |
          FLUTTER_VERSION="$(python3 - <<'PY'
          import json
          print(json.load(open('.fvmrc'))['flutter'])
          PY
          )"
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          architecture: ${{ matrix.architecture }}

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install workspace dependencies
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Build macOS release app
        working-directory: packages/bochki_schedule_app
        run: flutter build macos --release

      - name: Archive macOS app bundle
        working-directory: packages/bochki_schedule_app/build/macos/Build/Products/Release
        run: zip -r "${{ matrix.zip_name }}" bochki_schedule_app.app

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packages/bochki_schedule_app/build/macos/Build/Products/Release/${{ matrix.zip_name }}
          if-no-files-found: error

  macos-release-publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: macos-release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bochki-schedule-macos-*-release
          path: release-assets
          merge-multiple: true

      - name: Publish macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: release-assets/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
